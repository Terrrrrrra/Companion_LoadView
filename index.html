<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>길동무</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        div#pano {
            width: 100%;
            height: 100%;
        }
    </style>
    <script type="text/javascript"
        src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=ra4y2dvddo&submodules=panorama"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let lat = params.get("lat");
        let lng = params.get("lng");
        let pan = params.get("pan");
        let tilt = params.get("tilt");
    </script>
</head>

<body>
    <div id="pano" style="position: relative; overflow: hidden;"></div>
    <script>
        var pano = null;

        naver.maps.onJSContentLoaded = function () {
            // 아이디 혹은 지도 좌표로 파노라마를 표시할 수 있습니다.
            pano = new naver.maps.Panorama("pano", {
                // panoId: "OregDk87L7tsQ35dcpp+Mg==",
                position: new naver.maps.LatLng(lat, lng),
                pov: {
                    pan: pan,
                    tilt: tilt,
                    fov: 100
                },
                flightSpot: false, // 항공 아이콘 표시 여부, default: true
            });
        };
    </script>
</body>

</html>
